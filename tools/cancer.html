<meta charset="UTF-8">

<!-- pwa-head-tags -->

<body>
<div class="sheet">
<div class="view active" id="view-cancer">
  <div class="app-header">
    <div>
      <div class="eyebrow">Cancer Staging &amp; Treatment</div>
      <h1>癌症分期與治療</h1>
    </div>
    <button class="back-btn" onclick="location.href='../index.html#card-view-cancer'">← 返回主選單</button>
  </div>

  <input type="text" class="onc-search" id="oncSearch" placeholder="搜尋癌症（中文／英文，例：胃、gastric、NET）…" oninput="renderPicker(this.value)">
  <!-- 方磚圖版上色:亮色→淺灰版畫、暗色→深板岩反相。sRGB 不可省,否則中間調會再偏一次 -->
  <svg width="0" height="0" style="position:absolute" aria-hidden="true"><defs>
    <filter id="plate-duo" color-interpolation-filters="sRGB">
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncR type="table" tableValues="0.100 0.940"/>
        <feFuncG type="table" tableValues="0.095 0.928"/>
        <feFuncB type="table" tableValues="0.085 0.906"/>
      </feComponentTransfer>
    </filter>
    <filter id="plate-cyano" color-interpolation-filters="sRGB">
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncR type="table" tableValues="0.82 0.169"/>
        <feFuncG type="table" tableValues="0.87 0.188"/>
        <feFuncB type="table" tableValues="0.92 0.202"/>
      </feComponentTransfer>
    </filter>
  </defs></svg>
  <div id="oncPicker"></div>
  <div id="oncDetail" style="display:none;"></div>

  <footer class="tool-footer" style="margin-top:24px;">
    分期依 AJCC Cancer Staging Manual, 8th ed.（Amin MB et al., Springer 2017）與各部位 AJCC v9 更新；治療依 NCCN Clinical Practice Guidelines 及內文所列臨床試驗。各癌症之主要文獻列於該癌症頁下方。本頁為教學整理，非商業指南之重製。
  </footer>
</div>
</div>
